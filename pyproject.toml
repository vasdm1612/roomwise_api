[tool.pylint.main]
py-version = "3.11"
ignore = [".venv", "tests"]
load-plugins = []
fail-under = 8.0

[tool.pylint.format]
max-line-length = 100

[tool.pylint.messages_control]
disable = [
  "too-few-public-methods",
  "duplicate-code",
  "too-many-locals",
  "too-many-positional-arguments",
  "too-many-arguments",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=70"
